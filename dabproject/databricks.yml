# This is a Databricks asset bundle definition for dabproject.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dabproject
  uuid: 548a0e63-622e-4cdc-8216-855ca6fd9615

include:
  - resources/*.yml
  - resources/*/*.yml


targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets:
      name_prefix: dev_${workspace.current_user.short_name}
      source_linked_deployment: false
    workspace:
      host: https://dbc-6b3f6922-56a0.cloud.databricks.com/

  prod:
    mode: production
    workspace:
      host: https://dbc-6b3f6922-56a0.cloud.databricks.com/
      # We explicitly deploy to /Workspace/Users/venkireddy.yella@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/venkireddy.yella@gmail.com/PROD/.bundle/${bundle.name}/${bundle.target}

    permissions:
      - group_name: admins
        level: CAN_MANAGE
      - user_name: venkireddy.yella@gmail.com
        level: CAN_MANAGE
